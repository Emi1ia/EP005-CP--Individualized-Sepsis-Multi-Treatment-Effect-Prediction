seed: 42

paths:
  data_root: "c:/Users/emili/sepsis_project/data/challenge-2019/training"
  out_dir: "c:/Users/emili/sepsis_project/data/sepsis_causal_artifacts/artifacts"

data:
  train_dirs:
    - "training_setA"
    - "training_setB"
  split_ratio:
    train: 0.70
    val: 0.15
    test: 0.15
  max_patients: null
  delta_cap_hours: 72.0
  synthetic_noise_std: 0.15

model:
  hidden_size: 128
  num_layers: 3
  num_heads: 8
  ff_dim: 256
  dropout: 0.12

train:
  epochs: 40
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.001
  grad_clip: 1.0
  early_stopping_patience: 8
  num_workers: 0
  lambda_propensity: 1.0
  lambda_balance: 0.08
  lambda_smooth: 0.05
  lambda_sepsis: 2.0
  sepsis_pos_weight: 4.0
  metric_target: "sepsis"
  metric_threshold: 0.5
  sepsis_target_mode: "future_horizon"
  sepsis_horizon_hours: 12
  early_stopping_metric: "auprc"
  early_stopping_mode: "max"
  sampler_mode: "balanced_patient"
  sampler_positive_fraction: 0.5
  sampler_num_samples: null
  sampler_replacement: true
  augmentation_enabled: true
  augmentation_positive_only: true
  augmentation_apply_prob: 0.9
  augmentation_noise_std: 0.015
  augmentation_scale_std: 0.03
  augmentation_feature_dropout_prob: 0.01
  augmentation_time_dropout_prob: 0.0
  augmentation_value_dim: 40
  augmentation_value_clip: 8.0
  max_train_patients: null
  max_val_patients: null

eval:
  threshold: 0.5
  sepsis_threshold: 0.5
  sepsis_patient_threshold: 0.5
  sepsis_target_mode: "future_horizon"
  sepsis_horizon_hours: 12
  sepsis_patient_aggregation: "max"

tune:
  method: "bayes"
  direction: "minimize"
  objective_metric: "hybrid_combo"
  classification_level: "patient"
  hybrid_objective_weights:
    pehe: 0.4
    ate_error: 0.4
    policy_regret: 0.7
    one_minus_sepsis_auroc: 3.0
    sepsis_rmse: 2.0
  study_name: "sepsis_hparam_tuning_patient_horizon"
  n_trials: 15
  max_total_trials: 15
  timeout_sec: null
  trial_epochs: 6
  trial_patience: 3
  max_train_patients: 7000
  max_val_patients: 2500
  search_space:
    model.hidden_size: [96, 128, 160]
    model.num_heads: [8]
    model.num_layers: [2, 3, 4]
    model.ff_multiplier: [2, 3]
    model.dropout_min: 0.08
    model.dropout_max: 0.20
    train.learning_rate_min: 0.00004
    train.learning_rate_max: 0.00025
    train.weight_decay_min: 0.000005
    train.weight_decay_max: 0.02
    train.batch_size: [32, 64]
    train.lambda_propensity_min: 0.6
    train.lambda_propensity_max: 1.3
    train.lambda_balance_min: 0.02
    train.lambda_balance_max: 0.20
    train.lambda_smooth_min: 0.02
    train.lambda_smooth_max: 0.12
    train.grad_clip_min: 0.5
    train.grad_clip_max: 2.0
    train.lambda_sepsis_min: 1.0
    train.lambda_sepsis_max: 5.0
    train.sepsis_pos_weight_min: 2.0
    train.sepsis_pos_weight_max: 12.0
    train.augmentation_noise_std_min: 0.0
    train.augmentation_noise_std_max: 0.06
    train.augmentation_scale_std_min: 0.0
    train.augmentation_scale_std_max: 0.10
    train.augmentation_feature_dropout_prob_min: 0.0
    train.augmentation_feature_dropout_prob_max: 0.05
    train.augmentation_time_dropout_prob_min: 0.0
    train.augmentation_time_dropout_prob_max: 0.03
    train.augmentation_apply_prob_min: 0.70
    train.augmentation_apply_prob_max: 1.0

optimize:
  auto_prepare: true
  reset_train_patient_limits: true
  calibrate_threshold: true
  threshold_target: "sepsis"
  threshold_level: "patient"
  sepsis_target_mode: "future_horizon"
  sepsis_horizon_hours: 12
  sepsis_patient_aggregation: "max"
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_steps: 91
  final_out_dir: "c:/Users/emili/sepsis_project/data/sepsis_causal_artifacts/artifacts_final_patient_horizon"
  output_config_path: "configs/final/final_patient_horizon_for_training.yaml"
