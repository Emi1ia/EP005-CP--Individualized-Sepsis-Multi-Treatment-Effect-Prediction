seed: 42

paths:
  data_root: "c:/Users/emili/sepsis_project/data/challenge-2019/training"
  out_dir: "c:/Users/emili/sepsis_project/data/sepsis_causal_artifacts/artifacts"

data:
  train_dirs:
    - "training_setA"
    - "training_setB"
  split_ratio:
    train: 0.70
    val: 0.15
    test: 0.15
  max_patients: null
  delta_cap_hours: 72.0
  synthetic_noise_std: 0.15

model:
  hidden_size: 128
  num_layers: 4
  num_heads: 8
  ff_dim: 256
  dropout: 0.10

train:
  epochs: 20
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping_patience: 5
  num_workers: 0
  lambda_propensity: 1.0
  lambda_balance: 0.1
  lambda_smooth: 0.05
  lambda_sepsis: 1.5
  sepsis_pos_weight: 3.0
  metric_target: "sepsis"
  metric_threshold: 0.5
  early_stopping_metric: "auprc"
  early_stopping_mode: "max"
  sampler_mode: "none"
  sampler_positive_fraction: 0.5
  sampler_num_samples: null
  sampler_replacement: true
  augmentation_enabled: false
  augmentation_positive_only: true
  augmentation_apply_prob: 0.9
  augmentation_noise_std: 0.0
  augmentation_scale_std: 0.0
  augmentation_feature_dropout_prob: 0.0
  augmentation_time_dropout_prob: 0.0
  augmentation_value_dim: 40
  augmentation_value_clip: 8.0
  max_train_patients: null
  max_val_patients: null

eval:
  threshold: 0.5
  sepsis_threshold: 0.5

tune:
  method: "bayes"
  direction: "minimize"
  study_name: "sepsis_hparam_tuning"
  n_trials: 20
  timeout_sec: null
  trial_epochs: 6
  trial_patience: 2
  max_train_patients: 5000
  max_val_patients: 1500
  search_space:
    model.hidden_size: [64, 96, 128, 160, 192]
    model.num_heads: [4, 8]
    model.num_layers: [2, 3, 4]
    model.ff_multiplier: [2, 3, 4]
    model.dropout_min: 0.05
    model.dropout_max: 0.30
    train.learning_rate_min: 0.00003
    train.learning_rate_max: 0.0005
    train.weight_decay_min: 0.000001
    train.weight_decay_max: 0.05
    train.batch_size: [32, 64]
    train.lambda_propensity_min: 0.5
    train.lambda_propensity_max: 2.0
    train.lambda_balance_min: 0.01
    train.lambda_balance_max: 0.6
    train.lambda_smooth_min: 0.005
    train.lambda_smooth_max: 0.25
    train.grad_clip_min: 0.5
    train.grad_clip_max: 2.0
    train.lambda_sepsis_min: 0.5
    train.lambda_sepsis_max: 3.0
    train.sepsis_pos_weight_min: 1.0
    train.sepsis_pos_weight_max: 8.0
