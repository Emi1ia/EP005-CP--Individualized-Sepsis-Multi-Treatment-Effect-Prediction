seed: 42

paths:
  data_root: "c:/Users/emili/sepsis_project/data/challenge-2019/training"
  out_dir: "c:/Users/emili/sepsis_project/data/sepsis_causal_artifacts/artifacts_smoke"

data:
  train_dirs:
    - "training_setA"
    - "training_setB"
  split_ratio:
    train: 0.70
    val: 0.15
    test: 0.15
  max_patients: 300
  delta_cap_hours: 72.0
